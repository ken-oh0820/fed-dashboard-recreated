<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fed Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* === Common Variables === */
:root {
  --font-text: 'IBM Plex Sans KR', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
  --font-text-weight: 500;
  --font-mono-weight: 500;
  --font-size: 15px;

  /* Light theme (default) */
  --bg: #f5f5f0;
  --bg2: #ffffff;
  --bg3: #e8e8e0;
  --text: #1a1a18;
  --text2: #4a4a45;
  --text3: #8a8a80;
  --border: #d0d0c8;
  --border2: #b0b0a8;
  --accent: #2a2a25;
  --primary: #5b7b8b;
  --secondary: #8ba89b;
  --pos: #22c55e;
  --neg: #ef4444;
}

body.dark {
  --bg: #1a1a18;
  --bg2: #2a2a25;
  --bg3: #3a3a35;
  --text: #e8e6d6;
  --text2: #c8c6b6;
  --text3: #8a8880;
  --border: #4a4a45;
  --border2: #5a5a55;
  --accent: #c8c6b6;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-text);
  font-size: var(--font-size);
  font-weight: var(--font-text-weight);
  line-height: 1.5;
}

.font-sm { --font-size: 13px; }
.font-md { --font-size: 15px; }
.font-lg { --font-size: 17px; }
.font-xl { --font-size: 19px; }

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

.dash { padding: 20px; max-width: 1400px; margin: 0 auto; }
.hd { padding: 12px 20px; margin: -20px -20px 25px -20px; background: #2a2a25; }
.dark .hd { background: #1a1a18; }
.hd-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.hd-left { display: flex; align-items: center; gap: 12px; }
.hd h1 { font-family: var(--font-text); font-size: 1.1rem; color: #fff; font-weight: 600; display: flex; align-items: center; gap: 8px; margin: 0; }
.dark .hd h1 { color: #e8e6d6; }
.hd-title-kr { font-size: 0.85rem; color: rgba(255,255,255,0.6); font-weight: 400; margin-left: 8px; }
.hd-btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* 일반 버튼 스타일 */
.btn { background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; font-family: inherit; font-size: 0.9em; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { background: var(--border); border-color: var(--border2); }

/* 헤더 내 버튼 (아이콘 버튼) */
.hd .btn { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); padding: 0; width: 32px; height: 32px; font-family: inherit; font-size: 0.85em; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.hd .btn:hover { background: rgba(255,255,255,0.25); }
.hd .btn svg { width: 16px; height: 16px; }
.hd .btn.with-text { width: auto; padding: 0 12px; gap: 6px; }
.pdf-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background: #22c55e; color: #000; border: none; height: 32px; padding: 0 12px; font-family: inherit; font-size: 0.8em; font-weight: 600; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.pdf-btn:hover { filter: brightness(1.1); }
.pdf-btn svg { width: 14px; height: 14px; }
.pdf-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.paste-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background: #22c55e; color: #000; border: none; height: 32px; padding: 0 12px; font-family: inherit; font-size: 0.8em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.paste-btn:hover { filter: brightness(1.1); }
.paste-btn svg { width: 14px; height: 14px; }
.rel-info { display: flex; gap: 16px; font-size: 0.8em; color: rgba(255,255,255,0.7); margin-top: 8px; flex-wrap: wrap; align-items: center; font-weight: 400; }
.rel-info strong { color: #fff; font-family: var(--font-mono); font-weight: var(--font-mono-weight); }
.status { display: flex; align-items: center; gap: 6px; font-size: 0.8em; color: rgba(255,255,255,0.6); }
.status-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }

.tabs { display: flex; gap: 1px; background: var(--border); overflow-x: auto; margin-bottom: 20px; }
.tab { flex: 1; min-width: 80px; background: var(--bg2); color: var(--text2); border: none; padding: 12px 10px; cursor: pointer; font-family: inherit; font-size: 0.85em; font-weight: 600; white-space: nowrap; transition: all 0.2s; }
.tab:hover { background: var(--bg3); color: var(--text); }
.tab.active { background: var(--accent); color: var(--bg); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: var(--bg2); border: 1px solid var(--border); padding: 20px; }
.card-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-kr { font-size: 1.1em; color: var(--accent); font-weight: 700; }
.card-en { font-size: 0.8em; color: var(--text3); font-weight: 500; }
.card-val { font-family: var(--font-mono); font-weight: var(--font-mono-weight); font-size: 1.6em; color: var(--text); margin-bottom: 6px; }
.card-desc { font-size: 0.85em; color: var(--text3); margin-bottom: 12px; }
.badges { display: flex; gap: 8px; flex-wrap: wrap; }
.badge { font-family: var(--font-mono); font-weight: var(--font-mono-weight); font-size: 0.85em; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); }
.badge.pos { color: var(--pos); border-color: var(--pos); }
.badge.neg { color: var(--neg); border-color: var(--neg); }

.box { background: var(--bg2); border: 1px solid var(--border); padding: 20px; margin-bottom: 24px; }
.box h3 { font-size: 1.1em; color: var(--accent); margin-bottom: 16px; font-weight: 700; }
.bar-grp { margin: 16px 0; }
.bar-lbl { display: flex; justify-content: space-between; font-size: 0.95em; margin-bottom: 8px; font-weight: 500; }
.sbar { display: flex; height: 28px; background: var(--bg3); border: 1px solid var(--border); overflow: hidden; }
.seg { height: 100%; transition: width 0.5s; }
.seg.tsy { background: var(--primary); }
.seg.mbs { background: var(--secondary); }
.seg.oth { background: var(--text3); }
.leg { display: flex; gap: 20px; margin-top: 10px; font-size: 0.85em; font-weight: 500; }
.dot { display: inline-block; width: 12px; height: 12px; margin-right: 6px; vertical-align: middle; }
.dot.tsy { background: var(--primary); }
.dot.mbs { background: var(--secondary); }
.dot.oth { background: var(--text3); }

.info { background: var(--bg2); border: 1px solid var(--border); padding: 20px; }
.info h4 { font-size: 1em; color: var(--accent); margin-bottom: 14px; font-weight: 700; }
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.info-item strong { display: block; color: var(--text); font-weight: 600; margin-bottom: 4px; }
.info-item p { font-size: 0.9em; color: var(--text2); line-height: 1.5; }

.tbl-box { background: var(--bg2); border: 1px solid var(--border); padding: 20px; margin-bottom: 24px; overflow-x: auto; }
.tbl-box h3 { font-size: 1.1em; color: var(--accent); margin-bottom: 6px; font-weight: 700; }
.tbl-sub { font-size: 0.85em; color: var(--text3); margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--bg3); font-weight: 600; color: var(--text2); }
td.val { font-family: var(--font-mono); font-weight: var(--font-mono-weight); text-align: right; }
td.chg { font-family: var(--font-mono); font-weight: var(--font-mono-weight); text-align: right; }
td.chg small { color: var(--text3); font-size: 0.85em; }
td.chg.pos { color: var(--pos); }
td.chg.neg { color: var(--neg); }
.bil { display: flex; flex-direction: column; gap: 2px; }
.bil .kr { font-weight: 600; color: var(--text); }
.bil .en { font-size: 0.8em; color: var(--text3); }
tr.l1 td:first-child .bil { padding-left: 16px; }
tr.l2 td:first-child .bil { padding-left: 32px; }
tr.sec-hd td { background: var(--bg3); font-weight: 700; color: var(--accent); font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
tr.tot td { background: var(--bg3); font-weight: 700; }
tr.hi td { background: rgba(91, 123, 139, 0.15); font-weight: 700; }

.mat-chart { display: flex; justify-content: space-around; align-items: flex-end; gap: 12px; padding: 20px 0; margin-top: 20px; border-top: 1px solid var(--border); }
.mat-col { text-align: center; flex: 1; }
.mat-bar-wrap { height: 150px; display: flex; align-items: flex-end; justify-content: center; }
.mat-bar { width: 40px; background: linear-gradient(to top, var(--primary), var(--secondary)); border-radius: 4px 4px 0 0; min-height: 5px; transition: height 0.5s; }
.mat-lbl { font-size: 0.8em; color: var(--text2); margin-top: 8px; font-weight: 500; }
.mat-val { font-family: var(--font-mono); font-weight: var(--font-mono-weight); font-size: 0.85em; color: var(--text); margin-top: 4px; }

.stmt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
.stmt-sec h4 { font-size: 1em; color: var(--accent); margin-bottom: 12px; font-weight: 700; }

.summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
.summary-row .card { background: var(--bg3); }

.bk-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.bk-tab { background: var(--bg3); border: 1px solid var(--border); padding: 10px 14px; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; flex-direction: column; gap: 2px; min-width: 100px; }
.bk-tab:hover { border-color: var(--border2); background: var(--bg); }
.bk-tab.active { background: var(--accent); border-color: var(--accent); }
.bk-tab.active .bk-tab-name, .bk-tab.active .bk-tab-val, .bk-tab.active .bk-tab-pct { color: var(--bg); }
.bk-tab-name { font-weight: 600; font-size: 0.9em; color: var(--text); }
.bk-tab-val { font-family: var(--font-mono); font-weight: var(--font-mono-weight); font-size: 0.85em; color: var(--text); }
.bk-tab-pct { font-size: 0.75em; color: var(--text3); }
.bk-detail-panel { }
.bk-detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
.bk-detail-name { }
.bk-detail-kr { font-size: 1.3em; font-weight: 700; color: var(--accent); display: block; }
.bk-detail-en { font-size: 0.9em; color: var(--text3); }
.bk-detail-total { text-align: right; }
.bk-detail-total-val { font-family: var(--font-mono); font-weight: var(--font-mono-weight); font-size: 1.5em; color: var(--text); display: block; }
.bk-detail-total-pct { font-size: 0.85em; color: var(--text2); }
.bk-detail-chg { font-family: var(--font-mono); font-weight: var(--font-mono-weight); font-size: 0.85em; display: block; margin-top: 4px; }
.bk-detail-chg.pos { color: var(--pos); }
.bk-detail-chg.neg { color: var(--neg); }
.bk-detail-empty { padding: 40px; text-align: center; color: var(--text3); }

.chart-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.chart-controls label { font-weight: 600; color: var(--text2); }
.period-btn { background: var(--bg3); border: 1px solid var(--border); padding: 8px 16px; cursor: pointer; font-family: inherit; font-weight: 600; color: var(--text2); transition: all 0.2s; }
.period-btn:hover { background: var(--border); color: var(--text); }
.period-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
.chart-card { background: var(--bg2); border: 1px solid var(--border); padding: 20px; }
.chart-card h4 { font-size: 1.1em; color: var(--accent); font-weight: 700; }
.chart-card .sub { font-size: 0.85em; color: var(--text3); margin-bottom: 12px; }
.chart-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.chart-stat .label { font-size: 0.8em; color: var(--text3); }
.chart-stat .value { font-family: var(--font-mono); font-weight: var(--font-mono-weight); color: var(--text); }
.chart-stat .change { font-family: var(--font-mono); font-weight: var(--font-mono-weight); }
.chart-stat .change.pos { color: var(--pos); }
.chart-stat .change.neg { color: var(--neg); }
.chart-svg { width: 100%; height: auto; }
.chart-line { fill: none; stroke: var(--primary); stroke-width: 2; }
.chart-area { fill: rgba(91, 123, 139, 0.15); }
.chart-dot { fill: var(--primary); }
.chart-grid-line { stroke: var(--border); stroke-dasharray: 2; }
.chart-label { font-size: 10px; fill: var(--text3); }
.no-data { text-align: center; padding: 60px 20px; color: var(--text2); }
.no-data h3 { margin-bottom: 10px; }

.modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; }
.modal.open { display: block; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
.modal-overlay.open { display: block; }
.modal-content { background: var(--bg2); border: 1px solid var(--border); padding: 0; max-width: 500px; width: 90vw; max-height: 85vh; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg3); }
.modal-header h3 { font-size: 1.1em; color: var(--text); margin: 0; font-weight: 600; }
.modal-body { padding: 20px; max-height: calc(85vh - 130px); overflow-y: auto; }
.form-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg3); }
.form-actions .btn { min-width: 80px; padding: 10px 20px; font-size: 0.9em; }
.saved-list { max-height: 300px; overflow-y: auto; }
.saved-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
.saved-item:hover { background: var(--bg3); }
.saved-date { font-weight: 600; color: var(--text); }
.saved-val { font-size: 0.85em; color: var(--text2); font-family: var(--font-mono); font-weight: var(--font-mono-weight); }
.btn-sm { padding: 6px 12px; font-size: 0.85em; }
.btn-danger { background: var(--neg); color: #fff; border-color: var(--neg); }
.btn-danger:hover { filter: brightness(1.1); background: var(--neg); }

.setting-group { margin-bottom: 20px; }
.setting-group label { display: block; font-weight: 600; color: var(--text2); margin-bottom: 10px; font-size: 0.9em; }
.setting-row { display: flex; flex-wrap: wrap; gap: 8px; }
.setting-btn { background: var(--bg3); border: 1px solid var(--border); padding: 10px 16px; cursor: pointer; font-family: inherit; font-weight: 500; color: var(--text2); transition: all 0.2s; font-size: 0.9em; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
.setting-btn:hover { background: var(--border); color: var(--text); }
.setting-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.setting-btn svg { flex-shrink: 0; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: var(--bg); padding: 14px 24px; font-weight: 600; z-index: 2000; opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.error { background: var(--neg); color: #fff; }

.loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; justify-content: center; align-items: center; }
.loading.show { display: flex; }
.spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.dropzone-initial { border: 2px dashed var(--border2); padding: 60px 40px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg2); margin-bottom: 20px; }
.dropzone-initial:hover, .dropzone-initial.dragover { border-color: var(--accent); background: var(--bg3); }
.dropzone-initial h2 { font-size: 1.3em; color: var(--accent); margin-bottom: 12px; }
.dropzone-initial p { color: var(--text2); margin-bottom: 8px; }
.dropzone-initial a { color: var(--pos); }
.dropzone-initial input { display: none; }
.dropzone-hint { font-size: 0.85em; color: var(--text3); margin-top: 16px; }
.upload-btns { display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
.upload-btn { display: inline-block; background: var(--accent); color: var(--bg); border: none; padding: 14px 32px; font-family: inherit; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.upload-btn-alt { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.upload-btn-alt:hover { background: var(--border); }
.upload-btn:hover { filter: brightness(1.1); }
.upload-btn:active { transform: scale(0.98); }

.modal-lg { max-width: 600px; width: 95vw; }
.paste-guide { color: var(--text2); margin-bottom: 16px; font-size: 0.9em; line-height: 1.5; }
#pasteTextarea { width: 100%; height: 250px; padding: 14px; font-family: var(--font-mono); font-size: 0.85em; background: var(--bg); border: 1px solid var(--border); color: var(--text); resize: vertical; line-height: 1.5; }
#pasteTextarea:focus { outline: none; border-color: var(--accent); }
.btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn-primary:hover { filter: brightness(1.1); }

.app-footer { position: fixed; left: 20px; bottom: 20px; font-size: 0.75em; color: var(--text3); opacity: 0.5; transition: opacity 0.2s; display: flex; align-items: center; gap: 6px; z-index: 50; }
.app-footer:hover { opacity: 1; }
.app-footer a { color: var(--text3); text-decoration: none; }
.app-footer a:hover { color: var(--text2); }
.app-footer .sep { opacity: 0.5; }

.nav-arrows { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
.nav-btn { width: 44px; height: 44px; background: var(--bg2); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text); -webkit-tap-highlight-color: transparent; }
.nav-btn:hover { background: var(--bg3); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn svg { width: 20px; height: 20px; }

/* ===== 모바일 최적화 ===== */
@media (max-width: 768px) {
  /* 기본 레이아웃 */
  .dash { padding: 12px; }
  
  /* 헤더 */
  .hd { padding: 12px; margin: -12px -12px 16px -12px; }
  .hd-top { flex-direction: row; align-items: center; gap: 8px; }
  .hd-left { flex: 1; text-align: left; flex-direction: row; align-items: center; gap: 6px; }
  .hd h1 { font-size: 1em; }
  .hd-title-kr { display: none; }
  .hd-btns { gap: 4px; }
  .hd .btn { width: 36px; height: 36px; }
  .hd .btn svg { width: 16px; height: 16px; }
  .hd .btn[title="테마 변경"] { display: none; }
  .pdf-btn { height: 36px; padding: 0 10px; font-size: 0.75em; }
  .paste-btn { height: 36px; padding: 0 10px; font-size: 0.75em; }
  .rel-info { justify-content: flex-start; font-size: 0.7em; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  
  /* 탭 - 두 줄 (5개 + 4개) */
  .tabs { 
    margin: 0 -12px 16px -12px; 
    padding: 0; 
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    background: var(--bg);
    overflow: visible;
  }
  .tab { 
    width: 20%;
    box-sizing: border-box;
    padding: 10px 2px; 
    font-size: 0.65em; 
    background: var(--bg2);
    border: 1px solid var(--border);
    border-right: none;
    text-align: center;
    white-space: nowrap;
    margin: 0;
  }
  .tab:nth-child(5) { border-right: 1px solid var(--border); }
  .tab:nth-child(n+6) { width: 25%; }
  .tab:last-child { border-right: 1px solid var(--border); }
  .tab svg { display: none; }
  
  /* 카드 그리드 */
  .grid { grid-template-columns: 1fr; gap: 10px; }
  .card { padding: 12px; }
  .card-hd { flex-direction: column; align-items: flex-start; gap: 2px; }
  .card-kr { font-size: 0.95em; }
  .card-en { font-size: 0.7em; }
  .card-val { font-size: 1.3em; margin: 8px 0; }
  .card-desc { font-size: 0.75em; }
  .badges { gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 0.7em; padding: 4px 8px; }
  
  /* 박스 */
  .box { padding: 12px; margin-bottom: 12px; }
  .box h3 { font-size: 0.95em; }
  
  /* 테이블 - 가로 스크롤 제거 */
  .tbl-box { padding: 12px; margin-bottom: 12px; overflow: visible; }
  .tbl-box h3 { font-size: 0.95em; }
  .tbl-sub { font-size: 0.7em; margin-bottom: 10px; }
  .stmt-sec { overflow: visible; }
  table { font-size: 0.7em; min-width: unset !important; width: 100%; table-layout: fixed; }
  th, td { padding: 6px 4px; word-break: break-word; }
  th { font-size: 0.7em; }
  td.val, td.chg { font-size: 0.65em; }
  .bil { flex-direction: column; gap: 1px; }
  .bil .kr { font-size: 0.8em; }
  .bil .en { font-size: 0.6em; display: none; }
  
  /* 재무제표 그리드 */
  .stmt-grid { grid-template-columns: 1fr; gap: 16px; }
  .stmt-sec h4 { font-size: 0.9em; margin-bottom: 10px; }
  
  /* 요약 행 */
  .summary-row { grid-template-columns: 1fr; gap: 10px; margin-top: 16px; }
  .summary-row .card { padding: 12px; }
  .summary-row .card-val { font-size: 1.2em; }
  
  /* 차트 */
  .chart-grid { grid-template-columns: 1fr; gap: 12px; }
  .chart-controls { flex-wrap: wrap; gap: 6px; }
  .period-btn { padding: 8px 12px; font-size: 0.75em; }
  
  /* 만기 차트 */
  .mat-chart { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 12px 0; }
  .mat-col { min-width: unset; }
  .mat-bar-wrap { height: 80px; }
  .mat-bar { width: 20px; }
  .mat-lbl { font-size: 0.6em; }
  .mat-val { font-size: 0.6em; }
  
  /* 범례, 바 */
  .leg { flex-wrap: wrap; gap: 8px; font-size: 0.7em; }
  .bar-lbl { font-size: 0.75em; }
  .sbar { height: 24px; }
  
  /* 정보 박스 */
  .info { padding: 12px; }
  .info h4 { font-size: 0.9em; }
  .info-grid { grid-template-columns: 1fr; gap: 12px; }
  .info-item p { font-size: 0.75em; }
  
  /* 지역 연준 탭 */
  .bk-tabs { gap: 4px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 12px; margin: 0 -12px; padding-left: 12px; padding-right: 12px; }
  .bk-tab { min-width: 70px; padding: 8px 10px; flex-shrink: 0; }
  .bk-tab-name { font-size: 0.7em; }
  .bk-tab-val { font-size: 0.65em; }
  .bk-tab-pct { font-size: 0.6em; }
  .bk-detail-header { flex-direction: column; gap: 8px; }
  .bk-detail-total { text-align: left; }
  .bk-detail-kr { font-size: 1em; }
  .bk-detail-total-val { font-size: 1.2em; }
  
  /* 드롭존 */
  .dropzone-initial { padding: 30px 16px; margin: 0; border-radius: 8px; }
  .dropzone-initial svg { width: 36px; height: 36px; }
  .dropzone-initial h2 { font-size: 1em; }
  .dropzone-initial p { font-size: 0.8em; }
  .dropzone-hint { display: none; }
  .upload-btns { flex-direction: column; gap: 8px; width: 100%; }
  .upload-btn { width: 100%; padding: 14px; font-size: 0.9em; }
  
  /* 모달 */
  .modal-content { width: 94%; max-width: 360px; max-height: 85vh; height: auto; border: 1px solid var(--border); border-radius: 8px; }
  .modal-lg { max-width: 94%; }
  .modal-header { padding: 14px 16px; }
  .modal-header h3 { font-size: 1em; }
  .modal-body { padding: 16px; max-height: calc(85vh - 120px); }
  #pasteTextarea { height: 180px; font-size: 0.75em; }
  .form-actions { padding: 12px 16px; }
  .form-actions .btn { padding: 12px 20px; font-size: 0.9em; }
  
  /* 설정 버튼 */
  .setting-group { margin-bottom: 20px; }
  .setting-group label { font-size: 0.9em; margin-bottom: 10px; }
  .setting-row { gap: 8px; }
  .setting-btn { padding: 10px 14px; font-size: 0.85em; }
  
  /* 네비게이션 화살표 */
  .nav-arrows { right: 12px; top: auto; bottom: 80px; transform: none; }
  .nav-btn { width: 48px; height: 48px; }
  .nav-btn svg { width: 24px; height: 24px; }
  
  /* 푸터 */
  .app-footer { left: 16px; bottom: 16px; font-size: 0.7em; }
}

}
</style>

  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
} catch(e) {
  console.log('PDF.js 로드 실패');
}

var DATA_STORE_KEY = 'fedDashboard.savedData.v1';
var SETTINGS_STORE_KEY = 'fedDashboard.settings.v1';
var currentData = null;
var savedDataList = [];
var chartPeriod = '3m';
var defaultSettings = {theme:'dark',fontSize:'md',textFont:'ibm',monoFont:'ibm'};
var settings = Object.assign({}, defaultSettings);
var fontMap = {
  text: { 
    ibm: "'IBM Plex Sans KR', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif",
    noto: "'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif", 
    inter: "'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif",
    source: "'Source Sans 3', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif"
  },
  mono: { 
    ibm: "'IBM Plex Mono', 'SF Mono', Consolas, monospace",
    source: "'Source Code Pro', 'SF Mono', Consolas, monospace",
    system: "'SF Mono', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace"
  }
};

function showToast(msg, isError = false) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 클립보드에서 직접 읽기
async function pasteFromClipboard() {
  try {
    var text = await navigator.clipboard.readText();
    
    if (!text || text.trim().length === 0) {
      showToast('클립보드가 비어있습니다', true);
      return;
    }
    
    if (text.length < 500) {
      showToast('텍스트가 너무 짧습니다', true);
      return;
    }
    
    showToast('분석 중...');
    
    parseH41Text(text, false);
    
    // UI 업데이트
    document.getElementById('dropzoneInitial').style.display = 'none';
    document.getElementById('tabsContainer').style.display = 'flex';
    document.getElementById('overview').classList.add('active');
    document.querySelector('.tab').classList.add('active');
    updateNavButtons();
    
    showToast('✅ 분석 완료');
  } catch (err) {
    // 클립보드 권한이 없는 경우 모달로 폴백
    showToast('클립보드 접근 불가 - 직접 붙여넣어주세요', true);
    openModal('pasteModal');
  }
}

async function saveDataToServer() {
  try {
    localStorage.setItem(DATA_STORE_KEY, JSON.stringify(savedDataList));
    updateStatus('저장됨');
  } catch (e) {
    console.error('Save error:', e);
    updateStatus('저장 실패');
    showToast('브라우저 저장소에 저장하지 못했습니다', true);
  }
}

async function loadDataFromServer() {
  try {
    var raw = localStorage.getItem(DATA_STORE_KEY);
    var data = raw ? JSON.parse(raw) : [];
    if (Array.isArray(data) && data.length > 0) {
      savedDataList = data;
      currentDataIndex = 0;
      currentData = null;
      var hint = document.getElementById('savedDataHint');
      if (hint) {
        hint.style.display = 'block';
        hint.textContent = '저장된 데이터 ' + savedDataList.length + '개가 있습니다. 상단 저장 데이터 버튼에서 불러오세요.';
      }
      updateStatus('저장 데이터 ' + savedDataList.length + '개');
      updateNavButtons();
    }
  } catch (e) {
    console.error('Load error:', e);

}

}

async function loadSettingsFromServer() {

    if (data && Object.keys(data).length > 0) settings = Object.assign({}, defaultSettings, data);

async function processMultiplePDFs(files) {
  document.getElementById('loading').classList.add('show');
  showToast('PDF 분석 중...');
  var processed = 0;
  var errors = 0;
  var lastError = '';
  
  for (var file of files) {
    try {
      await processSinglePDF(file);
      processed++;
    } catch (err) {
      console.error('PDF 처리 오류:', file.name, err);
      lastError = err.message || '알 수 없는 오류';
      errors++;
    }
  }
  
  document.getElementById('loading').classList.remove('show');
  
  if (processed > 0) {
    // 날짜순 정렬 (최신이 앞으로)
    savedDataList.sort((a, b) => {
      var dateA = new Date(a.releaseDate || '1900-01-01');
      var dateB = new Date(b.releaseDate || '1900-01-01');
      return dateB - dateA;
    });
    
    currentDataIndex = 0;
    currentData = savedDataList[0];
    saveDataToServer();
    renderAll();
    document.getElementById('dropzoneInitial').style.display = 'none';
    document.getElementById('tabsContainer').style.display = 'flex';
    document.getElementById('overview').classList.add('active');
    document.querySelector('.tab').classList.add('active');
    updateNavButtons();
    
    if (errors > 0) {
      showToast('✅ ' + processed + '개 완료, ⚠️ ' + errors + '개 실패');
    } else {
      showToast('✅ ' + processed + '개 PDF 분석 완료');
    }
  } else {
    showToast('❌ 실패: ' + lastError, true);
  }
}

async function processSinglePDF(file) {
  // 1단계: 파일 읽기
  var arrayBuffer;
  try {
    arrayBuffer = await new Promise((resolve, reject) => {
      var reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error('파일 읽기 실패'));
      reader.readAsArrayBuffer(file);
    });
  } catch (err) {
    throw new Error('파일 읽기: ' + err.message);
  }
  
  // 2단계: PDF 로드
  var pdf;
  try {
    var loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
    pdf = await loadingTask.promise;
  } catch (err) {
    throw new Error('PDF 로드: ' + (err.message || '실패'));
  }
  
  // 3단계: 텍스트 추출
  var fullText = '';
  try {
    for (var i = 1; i <= pdf.numPages; i++) {
      var page = await pdf.getPage(i);
      var textContent = await page.getTextContent();
      fullText += textContent.items.map(item => item.str).join(' ') + '\n';
    }
  } catch (err) {
    throw new Error('텍스트 추출: ' + (err.message || '실패'));
  }
  
  if (fullText.trim().length === 0) {
    throw new Error('텍스트 없음');
  }
  
  // 4단계: 파싱
  try {
    parseH41Text(fullText, true);
  } catch (err) {
    throw new Error('파싱: ' + (err.message || '실패'));
  }
}

function parseH41Text(text, skipRender = false) {
  var getMainFactorsText = () => {
    var start = text.search(/Reserve Bank credit/i);
    if (start < 0) return text;
    var section = text.slice(start);
    var end = section.search(/(?:1A\.\s*)?Memorandum Items|Securities held in custody for foreign official|2\.\s*Maturity Distribution/i);
    return end > 0 ? section.slice(0, end) : section;
  };
  var mainFactorsText = getMainFactorsText();
  var extractWithChanges = (label, sourceText = text) => {
    var patterns = [
      new RegExp(label + '[\\s\\S]{0,50}?([\\d,]+)\\s*([+-])\\s*([\\d,]+)\\s*([+-])\\s*([\\d,]+)', 'i'),
      new RegExp(label + '[^\\d]*?([\\d,]+)[^\\d]*?([+-])?\\s*([\\d,]+)?[^\\d]*?([+-])?\\s*([\\d,]+)?', 'i')
    ];
    for (var p of patterns) {
      var m = sourceText.match(p);
      if (m && m[1]) {
        var v = parseInt(m[1].replace(/,/g, '')) || 0;
        var w = parseInt((m[3] || '0').replace(/,/g, '')) || 0;
        var y = parseInt((m[5] || '0').replace(/,/g, '')) || 0;
        if (m[2] === '-') w = -w;
        if (m[4] === '-') y = -y;
        return { v, w, y };
      }
    }
    return { v: 0, w: 0, y: 0 };
  };
  var extractMainFactor = (label) => extractWithChanges(label, mainFactorsText);
  var extractMbsOutright = () => {
    var sanitized = mainFactorsText.replace(/Federal agency debt\s+(?:and|&)\s+mortgage-backed securities/gi, 'Federal agency debt custody securities');
    return extractWithChanges('Mortgage-backed securities', sanitized);
  };

  var dateMatch = text.match(/(?:December|January|February|March|April|May|June|July|August|September|October|November)\s+\d{1,2},?\s*\d{4}/i);
  var weekMatch = text.match(/Week\s+ended\s+(\w+\s+\d{1,2},?\s*\d{4})/i);

  currentData = {
    releaseDate: dateMatch ? dateMatch[0] : 'Unknown',
    asOfDate: weekMatch ? weekMatch[1] : (dateMatch ? dateMatch[0] : 'Unknown'),
    timestamp: new Date().toISOString(),
    reserveBankCredit: extractMainFactor('Reserve Bank credit'),
    securitiesHeld: extractMainFactor('Securities held outright'),
    treasurySecurities: extractMainFactor('U\\.?S\\.? Treasury securities'),
    bills: extractMainFactor('Bills'),
    notesAndBonds: extractMainFactor('Notes and bonds, nominal'),
    tips: extractMainFactor('Notes and bonds, inflation-indexed'),
    mbs: extractMbsOutright(),
    repos: extractMainFactor('Repurchase agreements'),
    loans: extractMainFactor('Loans'),
    primaryCredit: extractMainFactor('Primary credit'),
    btfp: extractMainFactor('Bank Term Funding Program'),
    swaps: extractMainFactor('Central bank liquidity swaps'),
    otherAssets: extractMainFactor('Other assets'),
    gold: extractMainFactor('Gold stock'),
    sdr: extractMainFactor('Special drawing rights'),
    treasuryCurrency: extractMainFactor('Treasury currency outstanding'),
    totalSupplying: extractMainFactor('Total factors supplying'),
    currency: extractMainFactor('Currency in circulation'),
    rrp: extractMainFactor('Reverse repurchase agreements'),
    foreignRrp: extractMainFactor('Foreign official'),
    deposits: extractMainFactor('Deposits with F\\.?R\\.? Banks'),
    tga: extractMainFactor('U\\.?S\\.? Treasury,? General Account'),
    otherDeposits: extractMainFactor('Other deposits'),
    totalAbsorbing: extractMainFactor('Total factors.*absorbing'),
    reserves: extractWithChanges('Reserve balances with Federal Reserve'),
    totalAssets: extractWithChanges('Total assets'),
    totalLiabilities: extractWithChanges('Total liabilities'),
    secLending: { overnight: extractWithChanges('Overnight'), term: extractWithChanges('Term'), total: extractWithChanges('Total securities lent') },
    frNotes: parseFRNotes(text),
    maturity: { treasury: parseMaturityRow(text, 'U\\.?S\\.? Treasury securities.*Holdings'), mbs: parseMaturityRow(text, 'Mortgage-backed securities.*Holdings') },
    banks: parseBanks(text)
  };

  if (currentData.reserves.v === 0) {
    var m = text.match(/Reserve balances[^\d]*?([\d,]+)/i);
    if (m) currentData.reserves.v = parseInt(m[1].replace(/,/g, ''));
  }

  var idx = savedDataList.findIndex(d => d.releaseDate === currentData.releaseDate);
  if (idx >= 0) savedDataList[idx] = Object.assign({}, currentData);
  else savedDataList.unshift(Object.assign({}, currentData));
  savedDataList.sort((a, b) => parseDate(b.releaseDate) - parseDate(a.releaseDate));
  
  if (skipRender) return; // 여러 파일 처리 시 마지막에만 렌더링
  
  saveDataToServer();
  currentDataIndex = savedDataList.findIndex(d => d.releaseDate === currentData.releaseDate);
  renderAll();
  document.getElementById('dropzoneInitial').style.display = 'none';
  document.getElementById('tabsContainer').style.display = 'flex';
  updateNavButtons();
  document.querySelector('.tab.active').click();
}

function parseMaturityRow(text, label) {
  var p = new RegExp(label + '[\\s\\S]{0,200}?([\\d,]+)\\s+([\\d,]+)\\s+([\\d,]+)\\s+([\\d,]+)\\s+([\\d,]+)\\s+([\\d,]+)\\s+([\\d,]+)', 'i');
  var m = text.match(p);
  if (m) return { d15: parseInt(m[1].replace(/,/g, '')) || 0, d90: parseInt(m[2].replace(/,/g, '')) || 0, d1y: parseInt(m[3].replace(/,/g, '')) || 0, y5: parseInt(m[4].replace(/,/g, '')) || 0, y10: parseInt(m[5].replace(/,/g, '')) || 0, y10plus: parseInt(m[6].replace(/,/g, '')) || 0, total: parseInt(m[7].replace(/,/g, '')) || 0 };
  return { d15: 0, d90: 0, d1y: 0, y5: 0, y10: 0, y10plus: 0, total: 0 };
}

function parseBanks(text) {
  var bankNames = ['Boston','New York','Philadelphia','Cleveland','Richmond','Atlanta','Chicago','St. Louis','Minneapolis','Kansas City','Dallas','San Francisco'];
  var banksKr = ['보스턴','뉴욕','필라델피아','클리블랜드','리치몬드','애틀랜타','시카고','세인트루이스','미니애폴리스','캔자스시티','댈러스','샌프란시스코'];
  
  var results = bankNames.map((name, i) => ({
    name,
    kr: banksKr[i],
    assets: 0,
    goldCerts: 0,
    sdrCerts: 0,
    coin: 0,
    securities: 0,
    treasuries: 0,
    mbs: 0,
    repos: 0,
    loans: 0,
    frNotes: 0,
    rrp: 0,
    deposits: 0,
    capital: 0,
    surplus: 0
  }));
  
  // "Statement of Condition of Each Federal Reserve Bank" 섹션 찾기
  var bankSection = text.match(/Statement of Condition of Each[\s\S]*?(?=Collateral Held|Federal Reserve Notes|$)/i);
  if (!bankSection) {
    // 기본값 반환
    var defaults = [169212,3370938,126828,247633,535872,458267,418720,110270,63049,87800,333546,659096];
    results.forEach((r, i) => r.assets = defaults[i]);
    return results;
  }
  
  var section = bankSection[0];
  
  // 항목별 파싱 - 행 단위로 숫자 12개 추출
  var parseRow = (pattern) => {
    var regex = new RegExp(pattern + '[^\\d]*([\\d,]+(?:\\s+[\\d,]+){11})', 'i');
    var m = section.match(regex);
    if (m) {
      return m[1].split(/\s+/).map(n => parseInt(n.replace(/,/g, '')) || 0);
    }
    return Array(12).fill(0);
  };
  
  var totalAssets = parseRow('Total assets');
  var goldCerts = parseRow('Gold certificate');
  var sdrCerts = parseRow('Special drawing rights');
  var securities = parseRow('Securities.*held outright');
  var treasuries = parseRow('U\\.?S\\.? Treasury securities');
  var mbsRow = parseRow('Federal agency.*MBS|Mortgage-backed');
  var repos = parseRow('Repurchase agreements');
  var loans = parseRow('Loans(?!.*securities)');
  var frNotes = parseRow('Federal Reserve notes');
  var rrp = parseRow('Reverse repurchase');
  var deposits = parseRow('Deposits(?!.*Treasury)');
  var capital = parseRow('Capital paid');
  var surplus = parseRow('Surplus');
  
  results.forEach((r, i) => {
    r.assets = totalAssets[i] || 0;
    r.goldCerts = goldCerts[i] || 0;
    r.sdrCerts = sdrCerts[i] || 0;
    r.securities = securities[i] || 0;
    r.treasuries = treasuries[i] || 0;
    r.mbs = mbsRow[i] || 0;
    r.repos = repos[i] || 0;
    r.loans = loans[i] || 0;
    r.frNotes = frNotes[i] || 0;
    r.rrp = rrp[i] || 0;
    r.deposits = deposits[i] || 0;
    r.capital = capital[i] || 0;
    r.surplus = surplus[i] || 0;
  });
  
  // 총 자산이 없으면 기본값
  if (results.every(r => r.assets === 0)) {
    var defaults = [169212,3370938,126828,247633,535872,458267,418720,110270,63049,87800,333546,659096];
    results.forEach((r, i) => r.assets = defaults[i]);
  }
  
  return results;
}

function parseFRNotes(text) {
  var banks = ['Boston','New York','Philadelphia','Cleveland','Richmond','Atlanta','Chicago','St. Louis','Minneapolis','Kansas City','Dallas','San Francisco'];
  var banksKr = ['보스턴','뉴욕','필라델피아','클리블랜드','리치몬드','애틀랜타','시카고','세인트루이스','미니애폴리스','캔자스시티','댈러스','샌프란시스코'];
  
  var results = banks.map((b, i) => ({ name: b, kr: banksKr[i], outstanding: 0, collateral: 0, gold: 0 }));
  
  // Federal Reserve Notes 섹션 찾기
  var notesSection = text.match(/Federal Reserve notes.*?outstanding.*?(?=\n\s*\n|\d+\.\s+[A-Z])/is);
  if (!notesSection) return results;
  
  var section = notesSection[0];
  
  // 각 연준 은행별 데이터 파싱
  banks.forEach((bank, i) => {
    // 은행명 뒤의 숫자들 찾기 (outstanding, collateral, gold 순서)
    var bankPattern = new RegExp(bank + '[\\s\\S]*?([\\d,]+)\\s+([\\d,]+)\\s+([\\d,]+)', 'i');
    var match = section.match(bankPattern);
    if (match) {
      results[i].outstanding = parseInt(match[1].replace(/,/g, '')) || 0;
      results[i].collateral = parseInt(match[2].replace(/,/g, '')) || 0;
      results[i].gold = parseInt(match[3].replace(/,/g, '')) || 0;
    }
  });
  
  // 만약 위 방식으로 못 찾으면, 테이블 형식으로 다시 시도
  if (results.every(r => r.outstanding === 0)) {
    // 숫자 행들을 찾아서 순서대로 매핑
    var numberRows = section.match(/[\d,]+\s+[\d,]+\s+[\d,]+/g);
    if (numberRows) {
      numberRows.slice(0, 12).forEach((row, i) => {
        var nums = row.match(/[\d,]+/g);
        if (nums && nums.length >= 3 && i < 12) {
          results[i].outstanding = parseInt(nums[0].replace(/,/g, '')) || 0;
          results[i].collateral = parseInt(nums[1].replace(/,/g, '')) || 0;
          results[i].gold = parseInt(nums[2].replace(/,/g, '')) || 0;
        }
      });
    }
  }
  
  return results;
}

function fmt(n) { return n == null ? '-' : new Intl.NumberFormat('en-US').format(n); }
function fmtChg(n) { return (n == null || n === 0) ? '-' : (n > 0 ? '+' : '') + fmt(n); }
function fmtPct(n) { return (n == null || n === 0) ? '-' : (n > 0 ? '+' : '') + n.toFixed(2) + '%'; }
function calcPct(change, base) { return (base && change) ? (change / base * 100) : 0; }
function chgClass(n) { return (n == null || n === 0) ? '' : (n > 0 ? 'pos' : 'neg'); }

}

function parseDate(str) {
  var months = {January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  var m = str.match(/(\w+)\s+(\d+),?\s*(\d{4})/);
  if (m) return new Date(parseInt(m[3]), months[m[1]] || 0, parseInt(m[2]));
  return new Date(str);
}

function renderSavedList() {

function deleteAllData() {
  if (!confirm('저장된 모든 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;

var currentDataIndex = 0;

function navData(dir) {
  var newIndex = currentDataIndex + dir;
  if (newIndex < 0 || newIndex >= savedDataList.length) return;
  currentDataIndex = newIndex;
  currentData = savedDataList[currentDataIndex];
  renderAll();
  updateNavButtons();
}

function updateNavButtons() {
  var navArrows = document.getElementById('navArrows');
  if (currentData && savedDataList.length > 1) {
    navArrows.style.display = 'flex';
    document.getElementById('navPrev').disabled = currentDataIndex === 0;
    document.getElementById('navNext').disabled = currentDataIndex === savedDataList.length - 1;
  } else {
    navArrows.style.display = 'none';
  }
}

function loadSaved(i) {
  currentDataIndex = i;
  currentData = savedDataList[i];
  renderAll();
  document.getElementById('dropzoneInitial').style.display = 'none';
  document.getElementById('tabsContainer').style.display = 'flex';
  updateNavButtons();
  closeModal('historyModal');
}

function deleteSaved(i) {
  if (!confirm('삭제할까요?')) return;
  savedDataList.splice(i, 1);
  if (savedDataList.length) {
    saveDataToServer();
    var hint = document.getElementById('savedDataHint');
    if (hint) {
      hint.style.display = 'block';
      hint.textContent = '저장된 데이터 ' + savedDataList.length + '개가 있습니다. 상단 저장 데이터 버튼에서 불러오세요.';
    }
  } else {
    localStorage.removeItem(DATA_STORE_KEY);
    var emptyHint = document.getElementById('savedDataHint');
    if (emptyHint) {
      emptyHint.style.display = 'none';
      emptyHint.textContent = '';
    }
    resetDashboardView();

  renderSavedList();
  showToast('🗑️ 삭제됨');

function renderBankDetailTable(bank, totalAllBanks, prevBank) {
  if (!bank) return '<div class="bk-detail-empty">데이터 없음</div>';
  
  var pct = (v) => totalAllBanks ? ((v / totalAllBanks) * 100).toFixed(2) + '%' : '-';
  var chg = (curr, prev) => {
    if (!prev || prev === 0) return { val: '-', pct: '-', cls: '' };
    var diff = curr - prev;
    var pctChg = ((diff / prev) * 100).toFixed(2);
    var cls = diff > 0 ? 'pos' : diff < 0 ? 'neg' : '';
    return { 
      val: diff === 0 ? '-' : (diff > 0 ? '+' : '') + fmt(diff), 
      pct: diff === 0 ? '-' : (diff > 0 ? '+' : '') + pctChg + '%',
      cls 
    };
  };
  
  var row = (kr, en, key, isL1 = false) => {
    var curr = bank[key] || 0;
    var prev = prevBank ? (prevBank[key] || 0) : 0;
    var c = chg(curr, prev);
    return `<tr class="${isL1 ? 'l1' : ''}"><td><div class="bil"><span class="kr">${kr}</span><span class="en">${en}</span></div></td><td class="val">${fmt(curr)}</td><td class="chg ${c.cls}">${c.val}<br><small>${c.pct}</small></td></tr>`;
  };
  
  var assetsChg = chg(bank.assets, prevBank?.assets);
  
  return `
    <div class="bk-detail-header">
      <div class="bk-detail-name">
        <span class="bk-detail-kr">${bank.kr}</span>
        <span class="bk-detail-en">${bank.name} Federal Reserve Bank</span>
      </div>
      <div class="bk-detail-total">
        <span class="bk-detail-total-val">$${fmt(bank.assets)}M</span>

}

function renderCharts() {
  if (savedDataList.length < 2) {
    document.getElementById('charts').innerHTML = `<div class="no-data"><h3>데이터가 부족합니다</h3><p>추이 차트를 보려면 최소 2개 이상의 데이터가 필요합니다.</p><p style="margin-top:16px;color:var(--text3)">현재 저장된 데이터: ${savedDataList.length}개</p></div>`;
    return;
  }
  var now = new Date();
  var periods = { '1m': 30, '3m': 90, '6m': 180, '1y': 365 };
  var days = periods[chartPeriod] || 90;
  var cutoff = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
  var filtered = savedDataList.filter(d => parseDate(d.releaseDate) >= cutoff);
  if (filtered.length < 2) filtered = savedDataList.slice(0, Math.min(savedDataList.length, 12));
  filtered = filtered.reverse();
  var metrics = [{key:'totalSupplying',kr:'총 자산',en:'Total Assets'},{key:'reserves',kr:'지급준비금',en:'Reserve Balances'},{key:'tga',kr:'TGA',en:'Treasury General Account'},{key:'rrp',kr:'역레포',en:'Reverse Repo'},{key:'securitiesHeld',kr:'보유 증권',en:'Securities Held'},{key:'currency',kr:'유통 통화',en:'Currency'}];
  var html = `<div class="chart-controls"><label>기간:</label><button class="period-btn ${chartPeriod==='1m'?'active':''}" onclick="setPeriod('1m')">1개월</button><button class="period-btn ${chartPeriod==='3m'?'active':''}" onclick="setPeriod('3m')">3개월</button><button class="period-btn ${chartPeriod==='6m'?'active':''}" onclick="setPeriod('6m')">6개월</button><button class="period-btn ${chartPeriod==='1y'?'active':''}" onclick="setPeriod('1y')">1년</button></div><div class="chart-grid">`;
  metrics.forEach(m => {
    var data = filtered.map(d => ({date:d.releaseDate,value:d[m.key]?.v||0})).filter(d => d.value > 0);
    if (data.length < 2) return;
    var values = data.map(d => d.value);
    var min = Math.min(...values), max = Math.max(...values), range = max - min || 1;
    var first = values[0], last = values[values.length - 1];
    var change = last - first, changePct = (change / first) * 100;
    var w = 360, h = 150, padL = 10, padR = 10, padT = 10, padB = 30;
    var chartW = w - padL - padR, chartH = h - padT - padB;
    var points = data.map((d, i) => ({x:padL+(i/(data.length-1))*chartW,y:padT+chartH-((d.value-min)/range)*chartH,...d}));
    var pathD = points.map((p, i) => `${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
    var areaD = pathD + ` L ${points[points.length-1].x} ${h-padB} L ${padL} ${h-padB} Z`;
    html += `<div class="chart-card"><h4>${m.kr}</h4><div class="sub">${m.en}</div><div class="chart-stats"><div class="chart-stat"><div class="label">현재</div><div class="value">$${(last/1e6).toFixed(2)}T</div></div><div class="chart-stat"><div class="label">변동</div><div class="change ${chgClass(change)}">${fmtChg(Math.round(change))} (${fmtPct(changePct)})</div></div></div><svg class="chart-svg" viewBox="0 0 ${w} ${h}"><path class="chart-area" d="${areaD}" /><path class="chart-line" d="${pathD}" />${points.map(p => `<circle class="chart-dot" cx="${p.x}" cy="${p.y}" r="4" />`).join('')}<text class="chart-label" x="${padL}" y="${h-8}">${data[0].date.split(',')[0]}</text><text class="chart-label" x="${w-padR}" y="${h-8}" text-anchor="end">${data[data.length-1].date.split(',')[0]}</text></svg></div>`;
  });
  html += '</div>';
  document.getElementById('charts').innerHTML = html;
}

function setPeriod(p) { chartPeriod = p; renderCharts(); }
